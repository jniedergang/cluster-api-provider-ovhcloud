              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OVHClusterSpec defines the desired state of OVHCluster.
            properties:
              controlPlaneEndpoint:
                description: ControlPlaneEndpoint represents the endpoint used to
                  communicate with the control plane.
                properties:
                  host:
                    description: host is the hostname on which the API server is serving.
                    maxLength: 512
                    type: string
                  port:
                    description: port is the port on which the API server is serving.
                    format: int32
                    type: integer
                required:
                - host
                - port
                type: object
              identitySecret:
                description: |-
                  IdentitySecret references the Secret containing OVH API credentials.
                  The Secret must contain keys: endpoint, applicationKey, applicationSecret, consumerKey.
                properties:
                  name:
                    description: Name is the name of the Secret.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Secret.
                    type: string
                required:
                - name
                - namespace
                type: object
              loadBalancerConfig:
                description: LoadBalancerConfig describes how the OVH managed load
                  balancer should be configured.
                properties:
                  flavorName:
                    default: small
                    description: |-
                      FlavorName is the OVH Octavia LB flavor name (small, medium, large, xl).
                      Defaults to "small" if not specified.
                    type: string
                  floatingNetworkID:
                    description: |-
                      FloatingNetworkID is the external network for the floating IP.
                      If set, a floating IP is created for external access to the control plane.
                    type: string
                  listeners:
                    description: Listeners is a list of additional listeners beyond
                      the default api-server listener (6443).
                    items:
                      description: OVHListener describes an additional listener on
                        the load balancer.
                      properties:
                        backendPort:
                          description: BackendPort is the port on the backend instances.
                          format: int32
                          type: integer
                        name:
                          description: Name is the name of the listener.
                          type: string
                        port:
                          description: Port is the port that the listener should listen
                            on.
                          format: int32
                          type: integer
                        protocol:
                          description: Protocol is the protocol for the listener.
                          enum:
                          - TCP
                          - HTTP
                          type: string
                      required:
                      - backendPort
                      - name
                      - port
                      - protocol
                      type: object
                    type: array
                  subnetID:
                    description: |-
                      SubnetID is the private subnet to attach the load balancer to.
                      If empty, the controller uses the subnet it created via NetworkConfig.
                    type: string
                type: object
              networkConfig:
                description: NetworkConfig describes the private network configuration
                  for the cluster.
                properties:
                  dnsServers:
                    description: DNSServers is a list of DNS server IP addresses.
                    items:
                      type: string
                    type: array
                  gateway:
                    description: Gateway is the gateway IP address for the subnet.
                    type: string
                  privateNetworkID:
                    description: |-
                      PrivateNetworkID is the ID of an existing vRack private network.
                      If empty, a new private network is created automatically.
                    type: string
                  subnetCIDR:
                    description: |-
                      SubnetCIDR is the CIDR for the subnet (e.g. "10.0.0.0/24").
                      Required when creating a new network.
                    type: string
                  vlanID:
                    description: |-
                      VlanID is the vRack VLAN ID for the new private network.
                      OVH allows only one private network per VLAN ID per project, so when
                      running multiple CAPIOVH clusters in the same OVH project you MUST
                      give each cluster a distinct VlanID. Defaults to 0 (untagged) which
                      is fine for a single cluster but conflicts on multi-cluster setups.
                    maximum: 4094
                    minimum: 0
                    type: integer
                required:
                - subnetCIDR
                type: object
              region:
                description: Region is the OVH Cloud region (e.g. "GRA7", "SBG5",
                  "BHS5").
                type: string
              serviceName:
                description: ServiceName is the OVH Public Cloud project ID.
                type: string
              sshKeyName:
                description: SSHKeyName is the name of the SSH key registered in OVH
                  to inject into instances.
                type: string
            required:
            - identitySecret
            - loadBalancerConfig
            - region
            - serviceName
            type: object
          status:
            description: OVHClusterStatus defines the observed state of OVHCluster.
            properties:
              conditions:
                description: Conditions defines current service state of the OVH cluster.
                items:
                  description: Condition defines an observation of a Cluster API resource
                    operational state.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed. If that is not known, then using the time when
                        the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This field may be empty.
                      maxLength: 10240
                      minLength: 1
                      type: string
                    reason:
                      description: |-
                        reason is the reason for the condition's last transition in CamelCase.
                        The specific API may choose whether or not this field is considered a guaranteed API.
                        This field may be empty.
                      maxLength: 256
                      minLength: 1
                      type: string
                    severity:
                      description: |-
                        severity provides an explicit classification of Reason code, so the users or machines can immediately
                        understand the current situation and act accordingly.
                        The Severity field MUST be set only when Status=False.
                      maxLength: 32
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions
                        can be useful (see .node.status.conditions), the ability to deconflict is important.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              failureMessage:
                description: FailureMessage is a full error message dump of the above
                  failureReason.
                type: string
              failureReason:
                description: FailureReason is the short name for the reason why a
                  failure might be happening.
                type: string
              floatingIPID:
                description: FloatingIPID is the floating IP assigned to the load
                  balancer.
                type: string
              gatewayExposed:
                description: |-
                  GatewayExposed is set to true once the gateway has been attached to a
                  public port (via POST /gateway/{id}/expose) enabling SNAT outbound
                  connectivity for instances on the subnet.
                type: boolean
              gatewayID:
                description: |-
                  GatewayID is the internet gateway created on the private network when a
                  floating IP is allocated. The gateway has an interface on the subnet and,
                  once "exposed", provides SNAT outbound internet access for all instances
                  on the subnet.
                type: string
              listenerID:
                description: ListenerID is the ID of the API server listener on the
                  load balancer.
                type: string
              loadBalancerID:
                description: LoadBalancerID is the OVH load balancer identifier.
                type: string
              networkID:
                description: NetworkID is the ID of the private network being used.
                type: string
              poolID:
                description: PoolID is the ID of the backend pool on the load balancer.
                type: string
              ready:
                description: Ready describes if the OVH cluster infrastructure is
                  ready for machine creation.
                type: boolean
              registerListenerID:
                description: |-
                  RegisterListenerID is the ID of the RKE2 supervisor (port 9345)
                  listener on the load balancer. Only populated for RKE2-based clusters.
                type: string
              registerPoolID:
                description: |-
                  RegisterPoolID is the ID of the backend pool for the RKE2 supervisor
                  port on the load balancer.
                type: string
              subnetID:
                description: SubnetID is the ID of the subnet being used.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: false
    subresources:
      status: {}
  - additionalPrinterColumns:
