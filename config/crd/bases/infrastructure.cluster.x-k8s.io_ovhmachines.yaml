---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: ovhmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: OVHMachine
    listKind: OVHMachineList
    plural: ovhmachines
    singular: ovhmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Machine is ready
      jsonPath: .status.ready
      name: Ready
      type: string
    - description: OVH instance ID
      jsonPath: .status.instanceID
      name: InstanceID
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OVHMachine is the Schema for the ovhmachines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OVHMachineSpec defines the desired state of OVHMachine.
            properties:
              additionalVolumes:
                description: AdditionalVolumes is a list of additional block storage
                  volumes to attach.
                items:
                  description: OVHVolume defines an additional block storage volume
                    to attach to the instance.
                  properties:
                    name:
                      description: Name is a human-readable name for the volume.
                      type: string
                    sizeGB:
                      description: SizeGB is the volume size in gigabytes.
                      minimum: 1
                      type: integer
                    type:
                      description: Type is the volume type (e.g. "classic", "high-speed",
                        "high-speed-gen2").
                      type: string
                  required:
                  - name
                  - sizeGB
                  type: object
                type: array
              failureDomain:
                description: FailureDomain is the availability zone.
                type: string
              flavorName:
                description: FlavorName is the OVH instance flavor (e.g. "b2-7", "b2-15",
                  "c2-15").
                type: string
              imageName:
                description: ImageName is the OS image name (e.g. "Ubuntu 22.04",
                  "Debian 12").
                type: string
              providerID:
                description: |-
                  ProviderID is set by the controller after instance creation.
                  Format: "ovhcloud://<region>/<instanceID>"
                type: string
              rootDiskSize:
                description: RootDiskSize is the root disk size in GB. 0 uses the
                  flavor default.
                type: integer
              sshKeyName:
                description: SSHKeyName overrides the cluster-level SSH key for this
                  machine.
                type: string
            required:
            - flavorName
            - imageName
            type: object
          status:
            description: OVHMachineStatus defines the observed state of OVHMachine.
            properties:
              addresses:
                description: Addresses contains the OVH instance associated addresses.
                items:
                  description: MachineAddress contains information for the node's
                    address.
                  properties:
                    address:
                      description: address is the machine address.
                      maxLength: 256
                      minLength: 1
                      type: string
                    type:
                      description: type is the machine address type, one of Hostname,
                        ExternalIP, InternalIP, ExternalDNS or InternalDNS.
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: Conditions defines current service state of the OVH machine.
                items:
                  description: Condition defines an observation of a Cluster API resource
                    operational state.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed. If that is not known, then using the time when
                        the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This field may be empty.
                      maxLength: 10240
                      minLength: 1
                      type: string
                    reason:
                      description: |-
                        reason is the reason for the condition's last transition in CamelCase.
                        The specific API may choose whether or not this field is considered a guaranteed API.
                        This field may be empty.
                      maxLength: 256
                      minLength: 1
                      type: string
                    severity:
                      description: |-
                        severity provides an explicit classification of Reason code, so the users or machines can immediately
                        understand the current situation and act accordingly.
                        The Severity field MUST be set only when Status=False.
                      maxLength: 32
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions
                        can be useful (see .node.status.conditions), the ability to deconflict is important.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              failureMessage:
                description: FailureMessage is a full error message dump of the above
                  failureReason.
                type: string
              failureReason:
                description: FailureReason is the short name for the reason why a
                  failure might be happening.
                type: string
              initialization:
                description: Initialization tracks internal provisioning state.
                properties:
                  provisioned:
                    description: Provisioned shows if the instance has been provisioned.
                    type: boolean
                type: object
              instanceID:
                description: InstanceID is the OVH instance UUID.
                type: string
              ready:
                description: Ready is true when the provider resource is ready.
                type: boolean
              volumeIDs:
                description: VolumeIDs tracks attached additional volume IDs.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
