namespace: capiovh-system

namePrefix: capiovh-

resources:
- namespace.yaml
- ../crd
- ../rbac
- ../manager
# Webhook + cert-manager require the cert-manager operator on the cluster.
# To deploy WITHOUT webhooks, comment out the two lines below and remove the
# webhookcainjection_patch from patches.
- ../webhook
- ../certmanager

patches:
- path: manager_image_patch.yaml
- path: manager_webhook_patch.yaml
- path: webhookcainjection_patch.yaml

# Replacements wire cert-manager Certificate dnsNames to the webhook Service,
# and inject the CA into the ValidatingWebhookConfiguration via the standard
# cert-manager.io/inject-ca-from annotation.
replacements:
# Certificate.metadata.namespace -> CRD/Webhook annotation namespace
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0

# Certificate.metadata.name -> CRD/Webhook annotation name
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1

# Service.metadata.namespace -> Certificate dnsNames index 1
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 1

# Service.metadata.name -> Certificate dnsNames index 0
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 0

# CAPI provider labels (required by clusterctl + Rancher Turtles for discovery).
labels:
- pairs:
    cluster.x-k8s.io/provider: infrastructure-ovhcloud
    cluster.x-k8s.io/v1beta1: v1alpha1
  includeSelectors: false
  fields:
  - path: metadata/labels
    create: true
