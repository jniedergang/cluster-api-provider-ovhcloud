# ClusterClass for CAPIOVH with RKE2 bootstrap.
#
# Install once per management cluster:
#   kubectl apply -f clusterclass-ovhcloud-rke2.yaml
#
# Then create clusters in ~30 lines of YAML by referencing
# spec.topology.class: ovhcloud-rke2 — see the cluster-template-rke2-clusterclass.yaml
# example for full topology-based usage.
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: ovhcloud-rke2
spec:
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: RKE2ControlPlaneTemplate
      name: ovhcloud-rke2-control-plane
    machineInfrastructure:
      ref:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: OVHMachineTemplate
        name: ovhcloud-rke2-control-plane
    machineHealthCheck:
      maxUnhealthy: "34%"
      nodeStartupTimeout: 20m
      unhealthyConditions:
        - type: Ready
          status: "False"
          timeout: 5m
        - type: Ready
          status: Unknown
          timeout: 5m
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
      kind: OVHClusterTemplate
      name: ovhcloud-rke2-cluster
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: RKE2ConfigTemplate
              name: ovhcloud-rke2-worker
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
              kind: OVHMachineTemplate
              name: ovhcloud-rke2-worker
        machineHealthCheck:
          maxUnhealthy: "34%"
          nodeStartupTimeout: 20m
          unhealthyConditions:
            - type: Ready
              status: "False"
              timeout: 5m
            - type: Ready
              status: Unknown
              timeout: 5m

  # --- Variables exposed to the Cluster ---
  variables:
    - name: serviceName
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "OVH Public Cloud project ID (serviceName)"
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "OVH region (e.g. EU-WEST-PAR, GRA9, SBG5)"
          default: "EU-WEST-PAR"
    - name: identitySecretName
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ovh-credentials
    - name: subnetCIDR
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: "10.42.0.0/24"
    - name: vlanID
      required: false
      schema:
        openAPIV3Schema:
          type: integer
          default: 0
          minimum: 0
          maximum: 4094
          description: |
            vRack VLAN ID for the cluster's private network. OVH allows
            ONLY ONE private network per VLAN ID per project, so when
            running multiple CAPIOVH clusters in the same OVH project
            you MUST give each cluster a distinct vlanID. Default 0
            (untagged) only works for a single cluster.
    - name: lbFlavor
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: small
          enum: [small, medium, large, xl]
    - name: floatingNetworkID
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ""
          description: "External network for the floating IP. Leave empty to keep API server private."
    - name: cpFlavor
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: b3-16
    - name: workerFlavor
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: b3-8
    - name: image
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: "Ubuntu 22.04"
    - name: sshKeyName
      required: true
      schema:
        openAPIV3Schema:
          type: string
    - name: rancherServerCA
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ""
          description: |
            PEM-encoded TLS certificate chain from the Rancher server.
            Required when Turtles uses agent-tls-mode=true (STRICT_VERIFY).
            Obtain it with:
              curl -sk https://RANCHER_URL/v3/settings/cacerts | jq -r .value
            The SAME value must also be set in the Rancher setting
            "cacerts" (Settings > cacerts in the UI). When non-empty, a
            ConfigMap cattle-system/serverca is auto-created on the
            workload cluster. The agent deployment still needs a one-time
            patch to mount it — see scripts/import-to-rancher.sh.

  # --- Patches that wire variables into the templates ---
  patches:
    - name: ovh-cluster-spec
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
            kind: OVHClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/serviceName
              valueFrom:
                variable: serviceName
            - op: add
              path: /spec/template/spec/region
              valueFrom:
                variable: region
            - op: add
              path: /spec/template/spec/identitySecret/name
              valueFrom:
                variable: identitySecretName
            - op: add
              path: /spec/template/spec/identitySecret/namespace
              valueFrom:
                template: "{{ .builtin.cluster.namespace }}"
            - op: add
              path: /spec/template/spec/networkConfig/subnetCIDR
              valueFrom:
                variable: subnetCIDR
            - op: add
              path: /spec/template/spec/networkConfig/vlanID
              valueFrom:
                variable: vlanID
            - op: add
              path: /spec/template/spec/loadBalancerConfig/flavorName
              valueFrom:
                variable: lbFlavor
            - op: add
              path: /spec/template/spec/loadBalancerConfig/floatingNetworkID
              valueFrom:
                variable: floatingNetworkID
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName

    - name: cp-machine-flavor
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
            kind: OVHMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/flavorName
              valueFrom:
                variable: cpFlavor
            - op: add
              path: /spec/template/spec/imageName
              valueFrom:
                variable: image
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName

    - name: worker-machine-flavor
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
            kind: OVHMachineTemplate
            matchResources:
              machineDeploymentClass:
                names: [default-worker]
          jsonPatches:
            - op: add
              path: /spec/template/spec/flavorName
              valueFrom:
                variable: workerFlavor
            - op: add
              path: /spec/template/spec/imageName
              valueFrom:
                variable: image
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName

    # Write the cluster region to a file on each machine. The provider-id
    # setup script in preRKE2Commands then reads this file at runtime and
    # combines it with the instance UUID from OVH OpenStack metadata to
    # build the correct kubelet --provider-id. This is required because
    # CAPI links Machine -> Node by providerID; without it, RKE2 registers
    # nodes with "rke2://<hostname>" which never matches OVHMachine's
    # "ovhcloud://<region>/<uuid>".
    - name: cp-region-file
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta1
            kind: RKE2ControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/files
              valueFrom:
                template: |
                  [
                    {"path":"/etc/capiovh/region","owner":"root:root","permissions":"0644","content":{{ .region | quote }}},
                    {"path":"/etc/rancher/rke2/config.yaml.d/10-cidrs.yaml","owner":"root:root","permissions":"0644","content":"cluster-cidr: 10.244.0.0/16\nservice-cidr: 10.96.0.0/16\ncluster-dns: 10.96.0.10\n"}
                    {{- if .rancherServerCA }},
                    {"path":"/var/lib/rancher/rke2/server/manifests/capiovh-rancher-serverca.yaml","owner":"root:root","permissions":"0640","content":{{ printf "apiVersion: v1\nkind: Namespace\nmetadata:\n  name: cattle-system\n---\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: serverca\n  namespace: cattle-system\ndata:\n  serverca: |\n%s" (.rancherServerCA | indent 4) | quote }}}
                    {{- end }}
                  ]

    - name: worker-region-file
      definitions:
        - selector:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
            kind: RKE2ConfigTemplate
            matchResources:
              machineDeploymentClass:
                names: [default-worker]
          jsonPatches:
            - op: add
              path: /spec/template/spec/files
              valueFrom:
                template: |
                  [{"path":"/etc/capiovh/region","owner":"root:root","permissions":"0644","content":{{ .region | quote }}}]

---
# Templates referenced by the ClusterClass above.

apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: OVHClusterTemplate
metadata:
  name: ovhcloud-rke2-cluster
spec:
  template:
    spec:
      serviceName: PLACEHOLDER  # patched
      region: PLACEHOLDER       # patched
      identitySecret:
        namespace: PLACEHOLDER  # patched (= cluster namespace via builtin)
        name: PLACEHOLDER       # patched
      loadBalancerConfig: {}    # patched
      networkConfig:
        subnetCIDR: PLACEHOLDER # patched
      sshKeyName: PLACEHOLDER   # patched
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: OVHMachineTemplate
metadata:
  name: ovhcloud-rke2-control-plane
spec:
  template:
    spec:
      flavorName: PLACEHOLDER
      imageName: PLACEHOLDER
      sshKeyName: PLACEHOLDER
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: OVHMachineTemplate
metadata:
  name: ovhcloud-rke2-worker
spec:
  template:
    spec:
      flavorName: PLACEHOLDER
      imageName: PLACEHOLDER
      sshKeyName: PLACEHOLDER
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: RKE2ControlPlaneTemplate
metadata:
  name: ovhcloud-rke2-control-plane
spec:
  template:
    spec:
      version: ""  # set by Cluster.spec.topology.version
      serverConfig:
        cni: calico
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
      # OVH Public Cloud instances on a private network do not receive a DNS
      # server via DHCP (only the gateway). Configure a public resolver so the
      # RKE2 installer can reach get.rke2.io, container registries, etc.
      # Write resolv.conf as a static file (replacing the systemd-resolved
      # symlink) so DNS works immediately, before systemd-resolved settles.
      preRKE2Commands:
        - |
          set -e
          # Override systemd-resolved (drop-in for future reboots).
          mkdir -p /etc/systemd/resolved.conf.d
          cat > /etc/systemd/resolved.conf.d/99-capiovh.conf <<'EOF'
          [Resolve]
          DNS=1.1.1.1 8.8.8.8
          FallbackDNS=9.9.9.9
          EOF
          # Replace the resolv.conf symlink with a static file so DNS works
          # NOW, without waiting for systemd-resolved to reload.
          rm -f /etc/resolv.conf
          cat > /etc/resolv.conf <<'EOF'
          nameserver 1.1.1.1
          nameserver 8.8.8.8
          nameserver 9.9.9.9
          options edns0 trust-ad
          EOF
          chmod 0644 /etc/resolv.conf
          # Do NOT restart systemd-resolved: a brief restart window can race
          # the immediately-following `curl get.rke2.io | sh`. The static
          # /etc/resolv.conf above already short-circuits the resolver to
          # 1.1.1.1 directly (libresolv reads it on every query). The drop-in
          # we wrote earlier is picked up on next reboot.
          # Block until DNS for github.com resolves via the static resolver.
          # Python's socket.gethostbyname uses libresolv directly (NOT NSS,
          # which could hit a stale systemd-resolved stub).
          for i in $(seq 1 30); do
            python3 -c "import socket; socket.gethostbyname('github.com')" 2>/dev/null && break
            sleep 2
          done
          # Configure kubelet --provider-id so the Node registers with the
          # "ovhcloud://<region>/<uuid>" providerID that CAPI expects.
          # REGION is written to /etc/capiovh/region by a ClusterClass
          # JSONPatch; UUID comes from OVH OpenStack metadata.
          REGION=$(cat /etc/capiovh/region 2>/dev/null)
          UUID=$(curl -sf http://169.254.169.254/openstack/latest/meta_data.json | python3 -c 'import json,sys;print(json.load(sys.stdin)["uuid"])' 2>/dev/null)
          if [ -n "$REGION" ] && [ -n "$UUID" ]; then
            mkdir -p /etc/rancher/rke2/config.yaml.d
            cat > /etc/rancher/rke2/config.yaml.d/90-provider-id.yaml <<EOF
          kubelet-arg:
            - "provider-id=ovhcloud://${REGION}/${UUID}"
          EOF
          fi
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: OVHMachineTemplate
          name: ovhcloud-rke2-control-plane
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: ovhcloud-rke2-worker
spec:
  template:
    spec:
      agentConfig: {}
      preRKE2Commands:
        - |
          set -e
          mkdir -p /etc/systemd/resolved.conf.d
          cat > /etc/systemd/resolved.conf.d/99-capiovh.conf <<'EOF'
          [Resolve]
          DNS=1.1.1.1 8.8.8.8
          FallbackDNS=9.9.9.9
          EOF
          rm -f /etc/resolv.conf
          cat > /etc/resolv.conf <<'EOF'
          nameserver 1.1.1.1
          nameserver 8.8.8.8
          nameserver 9.9.9.9
          options edns0 trust-ad
          EOF
          chmod 0644 /etc/resolv.conf
          systemctl restart systemd-resolved || true
          for i in $(seq 1 30); do
            getent hosts github.com >/dev/null 2>&1 && break
            sleep 2
          done
          REGION=$(cat /etc/capiovh/region 2>/dev/null)
          UUID=$(curl -sf http://169.254.169.254/openstack/latest/meta_data.json | python3 -c 'import json,sys;print(json.load(sys.stdin)["uuid"])' 2>/dev/null)
          if [ -n "$REGION" ] && [ -n "$UUID" ]; then
            mkdir -p /etc/rancher/rke2/config.yaml.d
            cat > /etc/rancher/rke2/config.yaml.d/90-provider-id.yaml <<EOF
          kubelet-arg:
            - "provider-id=ovhcloud://${REGION}/${UUID}"
          EOF
          fi
