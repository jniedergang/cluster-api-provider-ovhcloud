version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "kind/bump"
      - "area/dependency"
    ignore:
      # Ignore Cluster-API as it is upgraded manually.
      - dependency-name: "sigs.k8s.io/cluster-api"
      # Ignore controller-runtime as it is upgraded manually.
      - dependency-name: "sigs.k8s.io/controller-runtime"
      # Ignore k8s and its transitive modules as they are upgraded manually
      # together with controller-runtime.
      - dependency-name: "k8s.io/*"
      - dependency-name: "go.etcd.io/*"
      - dependency-name: "google.golang.org/grpc"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "kind/cleanup"
      - "area/build-and-release"
    ignore:
      # Stay on the Go major.minor declared in go.mod (1.24). Major-major
      # bumps (1.24 -> 1.25, 1.25 -> 1.26) require a coordinated bump of
      # go.mod's `go` and `toolchain` directives — do those manually.
      - dependency-name: "registry.suse.com/bci/golang"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "kind/cleanup"
      - "area/build-and-release"
