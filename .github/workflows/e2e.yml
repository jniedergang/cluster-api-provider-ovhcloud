name: e2e

on:
  workflow_dispatch:
    inputs:
      region:
        description: "OVH region to test in"
        required: false
        default: "GRA9"
        type: string
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 3 AM UTC

concurrency:
  group: e2e-${{ github.repository }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-ovhcloud
  ORG: ${{ github.repository_owner }}
  OVH_REGION: ${{ inputs.region || 'GRA9' }}

permissions:
  contents: read

jobs:
  e2e:
    name: e2e-lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Bind to the 'ovh' environment so OVH_* secrets require a reviewer
    # approval before the job can start. This is the main mitigation
    # against a compromised token pushing a malicious workflow on a
    # public repo: exfiltration would trigger an approval notification
    # instead of running silently.
    environment: ovh
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: capiovh-e2e

      - name: Install CAPI + RKE2 providers
        env:
          CLUSTER_TOPOLOGY: "true"
        run: |
          curl -sL https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.10.3/clusterctl-linux-amd64 -o /usr/local/bin/clusterctl
          chmod +x /usr/local/bin/clusterctl
          clusterctl init \
            --bootstrap rke2 \
            --control-plane rke2

      - name: Build and load CAPIOVH image
        run: |
          IMG_FULL=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}-amd64:e2e
          make docker-build IMG=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }} TAG=e2e ARCH=amd64
          podman save --format docker-archive "$IMG_FULL" -o /tmp/capiovh.tar
          kind load image-archive /tmp/capiovh.tar --name capiovh-e2e
          docker exec capiovh-e2e-control-plane crictl images | grep cluster-api-provider-ovhcloud

      - name: Deploy CAPIOVH
        run: |
          IMG_FULL=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}-amd64:e2e
          make deploy IMG="$IMG_FULL"
          # config/default/manager_image_patch.yaml hardcodes the upstream image
          # and overrides the kustomize edit; patch the live deployment instead.
          kubectl set image -n capiovh-system deployment/capiovh-controller-manager manager="$IMG_FULL"
          kubectl wait --for=condition=available --timeout=180s deployment/capiovh-controller-manager -n capiovh-system

      - name: Create OVH credentials secret
        env:
          OVH_ENDPOINT: ${{ secrets.OVH_ENDPOINT }}
          OVH_APP_KEY: ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET: ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
        run: |
          kubectl create namespace fleet-default || true
          # Pass secret values via stdin instead of --from-literal=$VAR so they
          # never appear as process args (visible to /proc, ps, or shell traces).
          umask 077
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          printf '%s' "$OVH_ENDPOINT"        > "$tmpdir/endpoint"
          printf '%s' "$OVH_APP_KEY"         > "$tmpdir/applicationKey"
          printf '%s' "$OVH_APP_SECRET"      > "$tmpdir/applicationSecret"
          printf '%s' "$OVH_CONSUMER_KEY"    > "$tmpdir/consumerKey"
          kubectl create secret generic ovh-credentials \
            --namespace=fleet-default \
            --from-file=endpoint="$tmpdir/endpoint" \
            --from-file=applicationKey="$tmpdir/applicationKey" \
            --from-file=applicationSecret="$tmpdir/applicationSecret" \
            --from-file=consumerKey="$tmpdir/consumerKey"

      - name: Apply ClusterClass
        run: |
          kubectl apply -n fleet-default \
            -f templates/clusterclass/rke2/clusterclass-ovhcloud-rke2.yaml

      - name: Run E2E lifecycle test
        env:
          OVH_SERVICE_NAME: ${{ secrets.OVH_SERVICE_NAME }}
          OVH_FLOATING_NETWORK_ID: ${{ secrets.OVH_FLOATING_NETWORK_ID }}
          OVH_SSH_KEY: ${{ secrets.OVH_SSH_KEY }}
        run: |
          ./test/e2e/run-full-cluster-test.sh "e2e-ci-$(date +%s | tail -c 6)"
        timeout-minutes: 30

      - name: Collect logs on failure
        if: failure()
        run: |
          kubectl logs -n capiovh-system deploy/capiovh-controller-manager --tail=100 > /tmp/controller.log 2>&1 || true
          kubectl get cluster,ovhcluster,ovhmachine,machine -A -o yaml > /tmp/resources.yaml 2>&1 || true
          kubectl describe pod -n capiovh-system -l control-plane=controller-manager > /tmp/pod-describe.log 2>&1 || true
          kubectl get events -n capiovh-system --sort-by=.lastTimestamp > /tmp/events.log 2>&1 || true
          docker exec capiovh-e2e-control-plane crictl --runtime-endpoint unix:///run/containerd/containerd.sock images > /tmp/crictl-images.log 2>&1 || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-logs
          path: /tmp/*.log
          retention-days: 1

      - name: Cleanup OVH resources
        if: always()
        run: |
          kubectl delete cluster.cluster.x-k8s.io -A --all --wait=false 2>/dev/null || true
          sleep 120
          kubectl get ovhcluster,ovhmachine -A 2>/dev/null || true
