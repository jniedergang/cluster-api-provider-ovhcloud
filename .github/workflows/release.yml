name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (must already exist)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-ovhcloud
  # Use the workflow_dispatch input if present, otherwise the pushed tag.
  TAG: ${{ inputs.tag || github.ref_name }}
  ORG: ${{ github.repository_owner }}

permissions:
  contents: read

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless OIDC + SLSA attestation
      attestations: write   # SLSA build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Docker login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ !contains(env.TAG, '-') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Sign container image with cosign (keyless OIDC)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  helm:
    name: helm-chart
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          VERSION="${{ env.TAG }}"
          VERSION="${VERSION#v}"  # strip leading v
          helm package chart/cluster-api-provider-ovhcloud --version "${VERSION}" --app-version "${{ env.TAG }}"
          helm push "cluster-api-provider-ovhcloud-${VERSION}.tgz" "oci://${{ env.REGISTRY }}/${{ env.ORG }}/charts"

  release:
    name: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Generate release manifests
        run: |
          make kustomize controller-gen
          make release-manifests RELEASE_TAG=${{ env.TAG }} ORG=${{ env.ORG }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ env.TAG }} > /dev/null 2>&1; then
            echo "${{ env.TAG }} release exists"
          else
            gh release create ${{ env.TAG }} --generate-notes
          fi
          for f in metadata.yaml infrastructure-components.yaml cluster-template.yaml cluster-template-kubeadm.yaml cluster-template-rke2-floatingip.yaml clusterclass-ovhcloud-rke2.yaml capiprovider-ovhcloud.yaml; do
            if [ -f "out/${f}" ]; then
              gh release upload ${{ env.TAG }} "out/${f}" --clobber
            fi
          done
