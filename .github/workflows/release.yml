name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (must already exist)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cluster-api-provider-ovhcloud
  # Use the workflow_dispatch input if present, otherwise the pushed tag.
  TAG: ${{ inputs.tag || github.ref_name }}
  ORG: ${{ github.repository_owner }}

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ !contains(env.TAG, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    name: helm-chart
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          VERSION="${{ env.TAG }}"
          VERSION="${VERSION#v}"  # strip leading v
          helm package chart/cluster-api-provider-ovhcloud --version "${VERSION}" --app-version "${{ env.TAG }}"
          helm push "cluster-api-provider-ovhcloud-${VERSION}.tgz" "oci://${{ env.REGISTRY }}/${{ env.ORG }}/charts"

  release:
    name: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate release manifests
        run: |
          make kustomize controller-gen
          make release-manifests RELEASE_TAG=${{ env.TAG }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ env.TAG }} > /dev/null 2>&1; then
            echo "${{ env.TAG }} release exists"
          else
            gh release create ${{ env.TAG }} --generate-notes
          fi
          for f in metadata.yaml infrastructure-components.yaml cluster-template.yaml cluster-template-kubeadm.yaml cluster-template-rke2-floatingip.yaml clusterclass-ovhcloud-rke2.yaml; do
            if [ -f "out/${f}" ]; then
              gh release upload ${{ env.TAG }} "out/${f}" --clobber
            fi
          done
